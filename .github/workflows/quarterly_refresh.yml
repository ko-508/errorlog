name: Weekly Article Refresh

on:
  # 取得不可ドメイン対策・データ掃除完了まで一時停止
  # schedule:
  #   - cron: '0 3 * * 5'
  workflow_dispatch:
    inputs:
      refresh_days:
        description: 'Days since last update (default: 30)'
        default: '30'
      max_refresh:
        description: 'Max articles to refresh (default: 20)'
        default: '20'

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-genai google-auth requests google-api-python-client

      - name: Fetch GSC data and update rewrite priority
        env:
          GA4_OAUTH_CLIENT_ID:     ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET: ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN: ${{ secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: python scripts/fetch_search_console.py
        continue-on-error: true

      - name: Refresh outdated articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '30' }}
          MAX_REFRESH: ${{ github.event.inputs.max_refresh || '20' }}
        run: python scripts/refresh_articles.py

      - name: Validate Front Matter (pre-commit gate)
        id: validate_fm
        continue-on-error: true
        run: |
          pip install pyyaml -q
          python scripts/validate_frontmatter.py

      - name: Remove articles failing validation
        if: steps.validate_fm.outcome == 'failure'
        run: |
          python - <<'EOF'
          import re
          from pathlib import Path
          HALFKATA = re.compile(r'[\uff61-\uff9f]')
          for f in sorted(Path('content/posts').glob('*.md')):
              text = f.read_text(encoding='utf-8')
              m = re.search(r'^description: "(.+?)"', text, re.MULTILINE)
              if m and len(HALFKATA.findall(m.group(1))) >= 2:
                  print(f'Reverted: {f.name}')
                  import subprocess
                  subprocess.run(['git', 'checkout', 'HEAD', '--', str(f)])
          EOF

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/ scripts/refresh_manifest.json data/search_queries.json
          if git diff --staged --quiet; then
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "refresh: $(date +%Y-%m-%d) update articles"
            git push
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

      - name: Request indexing for refreshed articles
        if: steps.push.outputs.deployed == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python scripts/request_index.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 ${context.workflow} 失敗 (${new Date().toISOString().slice(0,10)})`,
              body: [
                '## パイプライン停止検知',
                '',
                `- **ワークフロー**: \`${context.workflow}\``,
                `- **実行ログ**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **失敗日時**: ${new Date().toISOString()}`,
                '',
                '確認後、このIssueをクローズしてください。',
              ].join('\n'),
              labels: ['pipeline-failure'],
            });

  deploy:
    needs: refresh
    if: needs.refresh.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
