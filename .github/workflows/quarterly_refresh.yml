name: Weekly Article Refresh

on:
  schedule:
    - cron: '0 3 * * 5'
  workflow_dispatch:
    inputs:
      refresh_days:
        description: 'Days since last update (default: 30)'
        default: '30'
      max_refresh:
        description: 'Max articles to refresh (default: 20)'
        default: '20'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-genai

      - name: Refresh outdated articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '30' }}
          MAX_REFRESH: ${{ github.event.inputs.max_refresh || '20' }}
        run: python scripts/refresh_articles.py

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "refresh: $(date +%Y-%m-%d) update articles"
            git push
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: refresh
    if: needs.refresh.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
