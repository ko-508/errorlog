name: Quarterly Article Refresh

on:
  schedule:
    - cron: '0 3 1 */3 *'  # 3ヶ月ごと（1月・4月・7月・10月の1日）03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-generativeai

      - name: Refresh outdated articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REFRESH_DAYS: "90"
          MAX_REFRESH: "20"
        run: python scripts/refresh_articles.py

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "更新対象なし"
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "refresh: $(date +%Y-%m-%d) 記事を最新版に更新"
            git push
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: refresh
    if: needs.refresh.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
