name: Weekly Glossary Update

on:
  schedule:
    - cron: '0 2 * * 0'  # 毎週日曜 11:00 JST (UTC 02:00)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  glossary:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Repair low-quality glossary pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPAIR_BATCH: "10"
        run: python scripts/repair_glossary.py

      - name: Discover new terms
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/discover_terms.py

      - name: Scan and generate glossary pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOP_COUNT: "20"
        run: python scripts/scan_glossary.py

      - name: Insert glossary links into posts
        run: python scripts/insert_glossary_links.py

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/glossary/ content/posts/ scripts/terms.json
          if git diff --staged --quiet; then
            echo "新規用語ページなし"
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "glossary: $(date +%Y-%m-%d) 用語集を更新・記事にリンク挿入"
            git push
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 ${context.workflow} 失敗 (${new Date().toISOString().slice(0,10)})`,
              body: [
                '## パイプライン停止検知',
                '',
                `- **ワークフロー**: \`${context.workflow}\``,
                `- **実行ログ**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **失敗日時**: ${new Date().toISOString()}`,
                '',
                '確認後、このIssueをクローズしてください。',
              ].join('\n'),
              labels: ['pipeline-failure'],
            });

  deploy:
    needs: glossary
    if: needs.glossary.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
