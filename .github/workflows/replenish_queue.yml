name: Replenish Article Queue

on:
  schedule:
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      add_count:
        description: 'Items to add (default: 90)'
        default: '90'

permissions:
  contents: write

jobs:
  replenish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-genai

      - name: Discover trending tools
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/discover_tools.py

      - name: Replenish queue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADD_COUNT: ${{ github.event.inputs.add_count || '90' }}
        run: python scripts/replenish_queue.py

      - name: Generate tool articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COUNT: "3"
        run: python scripts/generate_tool_article.py

      - name: Commit and push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/queue.csv scripts/tools.json content/posts/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "queue: $(date +%Y-%m-%d) replenish queue and tool articles"
            git push
          fi
