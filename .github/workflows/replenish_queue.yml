name: Replenish Article Queue

on:
  schedule:
    - cron: '0 4 1 * *'   # 毎月1日 13:00 JST (UTC 04:00)
  workflow_dispatch:
    inputs:
      add_count:
        description: '追加件数（デフォルト: 180）'
        default: '180'

permissions:
  contents: write

jobs:
  replenish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-generativeai

      # Step 1: Reddit・X・HackerNews からトレンドツールを発見して tools.json に追加
      - name: Discover trending tools
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/discover_tools.py

      # Step 2: tools.json の全ツール × エラーコードで未カバー分を Gemini でリサーチ
      - name: Replenish queue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADD_COUNT: ${{ github.event.inputs.add_count || '180' }}
        run: python scripts/replenish_queue.py

      - name: Commit and push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/queue.csv scripts/tools.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "queue: $(date +%Y-%m-%d) キュー補充・ツール更新"
            git push
          fi
