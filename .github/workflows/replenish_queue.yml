name: Replenish Article Queue

on:
  schedule:
    - cron: '0 4 * * 6'   # 毎週土曜 13:00 JST (UTC 04:00)
  workflow_dispatch:
    inputs:
      add_count:
        description: '追加件数（デフォルト: 20）'
        default: '20'

permissions:
  contents: write

jobs:
  replenish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Replenish queue
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADD_COUNT: ${{ github.event.inputs.add_count || '20' }}
        run: python scripts/replenish_queue.py

      - name: Commit and push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/queue.csv
          if git diff --staged --quiet; then
            echo "追加なし"
          else
            COUNT=$(git diff HEAD scripts/queue.csv | grep '^+[^+]' | wc -l)
            git commit -m "queue: $(date +%Y-%m-%d) キューを補充（+${COUNT}件）"
            git push
          fi
