name: RSS Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # 毎日 11:00 JST（UTC 02:00）
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write
  issues: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/rss_requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/rss_requirements.txt

      - name: Run RSS pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCORE_THRESHOLD: '85'
          MAX_SCORE_CYCLE: '5'
        run: python scripts/rss_pipeline.py

      - name: Commit results
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/rss_processed.json
          git add content/posts/auto_*.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new drafts"
          else
            git commit -m "rss: $(date +%Y-%m-%d) auto drafts"
            for i in 1 2 3; do
              git pull --rebase && git push && break || sleep 10
            done
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 ${context.workflow} 失敗 (${new Date().toISOString().slice(0,10)})`,
              body: [
                '## パイプライン停止検知',
                '',
                `- **ワークフロー**: \`${context.workflow}\``,
                `- **実行ログ**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **失敗日時**: ${new Date().toISOString()}`,
                '',
                '確認後、このIssueをクローズしてください。',
              ].join('\n'),
              labels: ['pipeline-failure'],
            });
