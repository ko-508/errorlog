name: Validate Front Matter

on:
  push:
    paths:
      - 'content/posts/**'
  workflow_call:   # deploy.yml から呼び出し可能

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate Front Matter
        run: python scripts/validate_frontmatter.py
