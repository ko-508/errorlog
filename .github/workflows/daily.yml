name: Daily Article Publish

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 09:00 JST (UTC 00:00)
    - cron: '0 9 * * *'  # 毎日 18:00 JST (UTC 09:00)
  workflow_dispatch:      # 手動実行も可能

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish daily articles
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/daily_publish.py

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/ scripts/queue.csv
          if git diff --staged --quiet; then
            echo "新しい記事なし（キューが空か全てスキップ）"
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "daily: $(date +%Y-%m-%d) の記事を公開"
            git push
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: publish
    if: needs.publish.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
