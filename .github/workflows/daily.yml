name: Daily Article Publish

on:
  # 取得不可ドメインの引用検査の穴の対策完了まで一時停止
  # schedule:
  #   - cron: '0 1 * * *'  # 毎日 10:00 JST
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-genai google-auth requests pyyaml

      - name: Enrich queue with source URLs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BATCH_SIZE: "5"
        run: python scripts/enrich_queue.py
        continue-on-error: true

      - name: Publish daily articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DAILY_COUNT: "10"
          GENERATE_COUNT: "5"
          FACT_CHECK_NEW_ARTICLE_MAX_RETRIES: "3"
          FACT_CHECK_REPORT_RETENTION_DAYS: "30"
          FACT_CHECK_URL_CHECK: "true"
          MAX_CITATION_RETRIES: "0"
        run: python scripts/daily_publish.py

      - name: Insert glossary links into new articles
        run: |
          NEW=$(git status --porcelain content/posts/ | grep -E '^\?\?' | awk '{print $2}' | grep '\.md$' || true)
          if [ -z "$NEW" ]; then exit 0; fi
          echo "$NEW" | while IFS= read -r f; do
            python scripts/insert_glossary_links.py "$f"
          done

      - name: Validate Front Matter (pre-commit gate)
        id: validate_fm
        continue-on-error: true
        run: python scripts/validate_frontmatter.py

      - name: Remove articles failing validation
        if: steps.validate_fm.outcome == 'failure'
        run: |
          python - <<'EOF'
          import re, sys
          from pathlib import Path
          HALFKATA = re.compile(r'[\uff61-\uff9f]')
          posts = Path('content/posts')
          for f in sorted(posts.glob('*.md')):
              text = f.read_text(encoding='utf-8')
              m = re.search(r'^description: "(.+?)"', text, re.MULTILINE)
              if m and len(HALFKATA.findall(m.group(1))) >= 2:
                  print(f'Removed: {f.name}')
                  f.unlink()
          EOF

      # 2026-06-16 無効化: 新記事へのcheck_qualityは費用対効果が低く、
      # 既存記事の仕様変更追従は仕様が固まってからまとめて行う方針のため停止。
      # 再開時は下記7行のコメントを外すこと。
      # - name: Quality check (new articles only)
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #     GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      #     QUALITY_GEMINI_MODEL: "gemini-2.5-flash"
      #   run: python scripts/check_quality.py --from-session

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/ scripts/queue.csv
          [ -f data/rewrite_candidates.json ] && git add data/rewrite_candidates.json || true
          [ -f data/fact_check_new_article_failures.json ] && git add data/fact_check_new_article_failures.json || true
          [ -f data/fact_check_score_history.jsonl ] && git add data/fact_check_score_history.jsonl || true
          [ -d reports/fact_check ] && git add reports/fact_check/ || true
          [ -f data/publish_session.json ] && git add data/publish_session.json || true
          [ -f data/pending_articles.json ] && git add data/pending_articles.json || true
          [ -f data/editor_note_strip_log.jsonl ] && git add data/editor_note_strip_log.jsonl || true
          if git diff --staged --quiet; then
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "daily: $(date +%Y-%m-%d) publish articles"
            pushed=false
            for i in 1 2 3; do
              git pull --rebase && git push && pushed=true && break || sleep 10
            done
            if $pushed; then
              echo "deployed=true" >> $GITHUB_OUTPUT
            else
              echo "deployed=false" >> $GITHUB_OUTPUT
              echo "Push failed after 3 retries" >&2
              exit 1
            fi
          fi

      - name: Notify critical fact-check failures
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().slice(0, 10);
            let criticalToday = [];
            try {
              const raw = fs.readFileSync('data/fact_check_new_article_failures.json', 'utf-8');
              const data = JSON.parse(raw);
              criticalToday = Object.values(data).filter(v => v.last_checked_at === today);
            } catch (e) {}
            if (criticalToday.length === 0) return;
            const items = criticalToday
              .map(v => `- ${v.tool} ${v.status_code} (失敗: ${v.failure_count}回, status: ${v.status})`)
              .join('\n');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Critical fact-check failure (${today})`,
              body: [
                '## Critical Fact-Check Failures',
                '',
                items,
                '',
                `- **実行ログ**: ${runUrl}`,
                `- **記録ファイル**: \`data/fact_check_new_article_failures.json\``,
                '',
                '対象記事はキュー末尾に戻されました。確認後このIssueをクローズしてください。',
              ].join('\n'),
              labels: ['pipeline-failure'],
            });

      - name: Request indexing for new articles
        if: steps.push.outputs.deployed == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python scripts/request_index.py

      - name: Commit IndexNow log
        if: steps.push.outputs.deployed == 'true'
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          [ -f data/indexnow_log.jsonl ] && git add data/indexnow_log.jsonl || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "daily: update indexnow log"
            for i in 1 2 3; do
              git pull --rebase && git push && break || sleep 10
            done
          fi

      - name: Upload publish session artifact
        if: steps.push.outputs.deployed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: publish-session
          path: data/publish_session.json
          if-no-files-found: ignore

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 ${context.workflow} 失敗 (${new Date().toISOString().slice(0,10)})`,
              body: [
                '## パイプライン停止検知',
                '',
                `- **ワークフロー**: \`${context.workflow}\``,
                `- **実行ログ**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **失敗日時**: ${new Date().toISOString()}`,
                '',
                '確認後、このIssueをクローズしてください。',
              ].join('\n'),
              labels: ['pipeline-failure'],
            });

  deploy:
    needs: publish
    if: needs.publish.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  notify:
    needs: [publish, deploy]
    if: needs.publish.outputs.deployed == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Download publish session artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-session
          path: data
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send publish notification
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PUBLISH_NOTIFY_TO: ${{ secrets.GMAIL_USER }}
          PUBLISH_NOTIFY_FROM: ${{ secrets.GMAIL_USER }}
          PUBLISH_NOTIFY_MAX_RETRIES: "3"
          PUBLISH_NOTIFY_RETRY_SECONDS: "20"
          PUBLISH_NOTIFY_FAIL_ON_ERROR: "false"
        run: python scripts/publish_notify.py --session-file data/publish_session.json

      - name: Commit notification history
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          [ -f data/published_notification_history.json ] && git add data/published_notification_history.json || true
          if git diff --staged --quiet; then
            echo "No history changes"
          else
            git commit -m "notify: update publish notification history"
            for i in 1 2 3; do
              git pull --rebase && git push && break || sleep 10
            done
          fi
