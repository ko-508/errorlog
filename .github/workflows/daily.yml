name: Daily Article Publish

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-genai

      - name: Publish daily articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DAILY_COUNT: "3"
        run: python scripts/daily_publish.py

      - name: Insert glossary links into new articles
        run: |
          NEW=$(git status --porcelain content/posts/ | grep -E '^\?\?' | awk '{print $2}' | grep '\.md$')
          if [ -z "$NEW" ]; then exit 0; fi
          echo "$NEW" | while IFS= read -r f; do
            python scripts/insert_glossary_links.py "$f"
          done

      - name: Quality check (post-publish, newest 6 with Gemini)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/check_quality.py --newest 6

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/ scripts/queue.csv
          if git diff --staged --quiet; then
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "daily: $(date +%Y-%m-%d) publish articles"
            git push
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: publish
    if: needs.publish.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
