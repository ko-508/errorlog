name: Daily Article Publish

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日 10:00 JST (UTC 01:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Publish daily articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DAILY_COUNT: "6"
        run: python scripts/daily_publish.py

      # 新規生成された記事にその場で品質チェックとリンク挿入を実行
      - name: Quality check new articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          NEW=$(git status --porcelain content/posts/ | grep -E '^\?\?' | awk '{print $2}' | grep '\.md$')
          if [ -z "$NEW" ]; then
            echo "新規記事なし。スキップ。"
            exit 0
          fi
          echo "$NEW" | while IFS= read -r f; do
            echo "品質チェック: $f"
            python scripts/check_quality.py "$f"
          done

      - name: Insert glossary links into new articles
        run: |
          NEW=$(git status --porcelain content/posts/ | grep -E '^\?\?' | awk '{print $2}' | grep '\.md$')
          if [ -z "$NEW" ]; then
            exit 0
          fi
          echo "$NEW" | while IFS= read -r f; do
            echo "リンク挿入: $f"
            python scripts/insert_glossary_links.py "$f"
          done

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/ scripts/queue.csv
          if git diff --staged --quiet; then
            echo "新しい記事なし（キューが空か全てスキップ）"
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "daily: $(date +%Y-%m-%d) の記事を公開"
            git push
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: publish
    if: needs.publish.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
