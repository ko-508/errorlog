name: Daily Article Publish

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.push.outputs.deployed }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-genai google-auth requests

      - name: Publish daily articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DAILY_COUNT: "3"
          FACT_CHECK_NEW_ARTICLE_MAX_RETRIES: "3"
          FACT_CHECK_REPORT_RETENTION_DAYS: "30"
          FACT_CHECK_URL_CHECK: "true"
        run: python scripts/daily_publish.py

      - name: Insert glossary links into new articles
        run: |
          NEW=$(git status --porcelain content/posts/ | grep -E '^\?\?' | awk '{print $2}' | grep '\.md$' || true)
          if [ -z "$NEW" ]; then exit 0; fi
          echo "$NEW" | while IFS= read -r f; do
            python scripts/insert_glossary_links.py "$f"
          done

      - name: Quality check (post-publish, newest 6 with Gemini)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QUALITY_GEMINI_MODEL: "gemini-2.5-flash"
        run: python scripts/check_quality.py --newest 6

      - name: Commit and push
        id: push
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/ scripts/queue.csv data/rewrite_candidates.json
          [ -f data/fact_check_new_article_failures.json ] && git add data/fact_check_new_article_failures.json
          [ -f data/fact_check_score_history.jsonl ] && git add data/fact_check_score_history.jsonl
          [ -d reports/fact_check ] && git add reports/fact_check/
          [ -f data/publish_session.json ] && git add data/publish_session.json
          if git diff --staged --quiet; then
            echo "deployed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "daily: $(date +%Y-%m-%d) publish articles"
            git push
            echo "deployed=true" >> $GITHUB_OUTPUT
          fi

      - name: Request indexing for new articles
        if: steps.push.outputs.deployed == 'true'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python scripts/request_index.py

      - name: Notify Make (Threads)
        if: steps.push.outputs.deployed == 'true'
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: python scripts/notify_threads.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 ${context.workflow} 失敗 (${new Date().toISOString().slice(0,10)})`,
              body: [
                '## パイプライン停止検知',
                '',
                `- **ワークフロー**: \`${context.workflow}\``,
                `- **実行ログ**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **失敗日時**: ${new Date().toISOString()}`,
                '',
                '確認後、このIssueをクローズしてください。',
              ].join('\n'),
              labels: ['pipeline-failure'],
            });

  deploy:
    needs: publish
    if: needs.publish.outputs.deployed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  notify:
    needs: [publish, deploy]
    if: needs.publish.outputs.deployed == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send publish notification
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PUBLISH_NOTIFY_MAX_RETRIES: "10"
          PUBLISH_NOTIFY_RETRY_SECONDS: "60"
          PUBLISH_NOTIFY_FAIL_ON_ERROR: "false"
        run: python scripts/publish_notify.py --session-file data/publish_session.json

      - name: Commit notification history
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          [ -f data/published_notification_history.json ] && git add data/published_notification_history.json || true
          if git diff --staged --quiet; then
            echo "No history changes"
          else
            git commit -m "notify: update publish notification history"
            for i in 1 2 3; do
              git pull --rebase && git push && break || sleep 10
            done
          fi
