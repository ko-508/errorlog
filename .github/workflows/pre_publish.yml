name: Pre-Publish Quality Check

on:
  # 投稿前チェック: 毎日 09:30 JST (UTC 00:30) に直近6件を確認
  schedule:
    - cron: '30 0 * * *'
  # バックログ消化: 手動実行時は古い順で処理
  workflow_dispatch:
    inputs:
      mode:
        description: '処理モード'
        type: choice
        options:
          - newest   # 新しい順（投稿前チェック用）
          - oldest   # 古い順（バックログ消化用）
        default: newest
      batch:
        description: '処理件数'
        default: '6'

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run quality check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'newest' }}"
          BATCH="${{ github.event.inputs.batch || '6' }}"
          if [ "$MODE" = "newest" ]; then
            python scripts/check_quality.py --newest "$BATCH"
          else
            BATCH="$BATCH" python scripts/check_quality.py
          fi

      - name: Commit fixes
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "修正なし"
          else
            git commit -m "quality: 投稿前品質チェック自動修正 [skip ci]"
            git push
          fi
