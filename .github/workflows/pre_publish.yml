name: Pre-Publish Quality Check

on:
  # 新規・更新された記事を即時チェック
  push:
    paths:
      - 'content/posts/**.md'
  # 全記事を週次でローテーションチェック（mtime 昇順で古いものから処理）
  schedule:
    - cron: '0 20 * * 3'   # 毎週水曜 05:00 JST (UTC 水曜 20:00)
  workflow_dispatch:
    inputs:
      batch:
        description: '処理件数（デフォルト: 20）'
        default: '20'

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run quality check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # push 時は 10 件、スケジュール/手動は 20 件
          BATCH: ${{ github.event_name == 'push' && '10' || github.event.inputs.batch || '20' }}
        run: python scripts/check_quality.py

      - name: Commit fixes
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "修正なし"
          else
            git commit -m "quality: 品質チェック自動修正 [skip ci]"
            git push
          fi
