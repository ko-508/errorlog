name: Weekly GA4 Analysis

on:
  schedule:
    - cron: "0 22 * * 0"   # 月曜 7:00 JST (= 日曜 22:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-analytics-data anthropic google-api-python-client google-auth requests beautifulsoup4

      - name: Run GA4 analyzer
        env:
          GA4_PROPERTY_ID:          ${{ secrets.GA4_PROPERTY_ID }}
          GA4_OAUTH_CLIENT_ID:      ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET:  ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN:  ${{ secrets.GA4_OAUTH_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          NOISE_COUNTRIES:          "Singapore"
        run: python scripts/ga4_analyzer.py

      - name: Run GA4 feedback loop (Task 07 + 08)
        env:
          GA4_PROPERTY_ID:         ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_OAUTH_CLIENT_ID:     ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET: ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN: ${{ secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: python scripts/ga4_feedback_loop.py

      # 競合スクレイピングは現在は無効化中。
      # 再開する場合: このステップのコメントを外し、weekly_report.py の _load_competitor_section() 呼び出しも復元する。
      # - name: Scan competitor outlines
      #   continue-on-error: true
      #   run: python scripts/scan_competitors.py

      - name: Run Search Console analysis
        env:
          GSC_SITE_URL:            ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_OAUTH_CLIENT_ID:     ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET: ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN || secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: python scripts/fetch_search_console.py

      - name: Run weekly unified report
        env:
          GA4_PROPERTY_ID:          ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY:  ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_OAUTH_CLIENT_ID:      ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET:  ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN:  ${{ secrets.GA4_OAUTH_REFRESH_TOKEN }}
          GSC_SITE_URL:             ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY:  ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GSC_OAUTH_REFRESH_TOKEN:  ${{ secrets.GSC_OAUTH_REFRESH_TOKEN || secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: python scripts/weekly_report.py

      - name: Run Content Gap Analyzer
        continue-on-error: true
        env:
          GSC_SITE_URL:            ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GA4_OAUTH_CLIENT_ID:     ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET: ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN || secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: python scripts/query_coverage_analyzer.py

      - name: Update rewrite experiment results
        continue-on-error: true
        env:
          GSC_SITE_URL:            ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GA4_OAUTH_CLIENT_ID:     ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET: ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN || secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: python scripts/update_rewrite_results.py

      - name: Commit and push report
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/ga4/ 2>/dev/null || true
          git add scripts/rewrite_priority.json 2>/dev/null || true
          git add content/posts/ 2>/dev/null || true
          git add data/search_queries.json 2>/dev/null || true
          git add scripts/rewrite_report.json 2>/dev/null || true
          git add scripts/rewrite_priority_report.json 2>/dev/null || true
          git add data/rewrite_experiments.json 2>/dev/null || true
          git add data/content_gap.json 2>/dev/null || true
          git add scripts/content_gap_candidates.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "ga4: 週次分析レポート $(date +%Y-%m-%d)"
            git push
          fi

      - name: Create unified weekly report issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');
            const dir  = 'reports/ga4';

            let files;
            try {
              files = fs.readdirSync(dir)
                .filter(f => f.startsWith('weekly_report_') && f.endsWith('.json'))
                .sort()
                .reverse();
            } catch (e) {
              console.log('reports/ga4 not found – skip issue creation');
              return;
            }
            if (!files.length) {
              console.log('No weekly_report file – skip');
              return;
            }

            let data;
            try {
              data = JSON.parse(fs.readFileSync(path.join(dir, files[0]), 'utf8'));
            } catch (e) {
              console.log('Failed to parse weekly report JSON – skip');
              return;
            }

            if (!data.issue_title || !data.issue_body) {
              console.log('Missing issue_title or issue_body – skip');
              return;
            }

            for (const label of [
              { name: 'weekly-report',  color: '0075ca', description: 'Weekly unified GA4+GSC report' },
              { name: 'ga4-bottleneck', color: '0075ca', description: 'GA4 weekly bottleneck report' },
              { name: 'gsc-bottleneck', color: 'e4e669', description: 'Search Console weekly bottleneck report' },
            ]) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
              } catch (_) { /* already exists */ }
            }

            const { data: issue } = await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  data.issue_title,
              body:   data.issue_body,
              labels: ['weekly-report'],
            });
            console.log(`Issue created: #${issue.number}  ${issue.html_url}`);

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🚨 ${context.workflow} 失敗 (${new Date().toISOString().slice(0,10)})`,
              body: [
                '## パイプライン停止検知',
                '',
                `- **ワークフロー**: \`${context.workflow}\``,
                `- **実行ログ**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **失敗日時**: ${new Date().toISOString()}`,
                '',
                '確認後、このIssueをクローズしてください。',
              ].join('\n'),
              labels: ['pipeline-failure'],
            });
