name: Backfill Weekly Reports

on:
  workflow_dispatch:
    inputs:
      run_dates:
        description: "Comma-separated run dates. Empty means all existing weekly reports."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-analytics-data google-api-python-client google-auth requests beautifulsoup4

      - name: Backfill weekly reports with errorlog.jp host filter
        env:
          GA4_PROPERTY_ID:          ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_KEY:  ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_OAUTH_CLIENT_ID:      ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET:  ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN:  ${{ secrets.GA4_OAUTH_REFRESH_TOKEN }}
          GSC_SITE_URL:             ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_KEY:  ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          GSC_OAUTH_REFRESH_TOKEN:  ${{ secrets.GSC_OAUTH_REFRESH_TOKEN || secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: |
          if [ -n "${{ inputs.run_dates }}" ]; then
            python scripts/backfill_weekly_reports.py --run-dates "${{ inputs.run_dates }}"
          else
            python scripts/backfill_weekly_reports.py --all-existing
          fi

      - name: Commit and push backfilled reports
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/ga4/weekly_report_*.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "ga4: backfill weekly reports with host filter"
            git pull --rebase
            git push
          fi
