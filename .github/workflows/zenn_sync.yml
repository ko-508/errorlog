name: Sync to Zenn

on:
  schedule:
    - cron: "10 21 * * *"  # 毎日 06:10 JST。更新と非公開化のみ(新規公開は slugs 指定の手動実行のみ)
  workflow_dispatch:
    inputs:
      slugs:
        description: "同期する記事の slug (カンマ区切り。空なら従来どおり更新分を1件)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: errorlog
          fetch-depth: 0  # 更新判定に git のコミット日時を使うため全履歴を取得

      - uses: actions/checkout@v4
        with:
          repository: ko-508/zenn-content
          token: ${{ secrets.ZENN_GITHUB_TOKEN }}
          path: zenn-content

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync articles to Zenn format
        env:
          ZENN_DIR: ${{ github.workspace }}/zenn-content
          ZENN_LIMIT: "1"
          SYNC_SLUGS: ${{ github.event.inputs.slugs }}
        working-directory: errorlog
        run: |
          if [ -n "$SYNC_SLUGS" ]; then
            # slug 指定時は件数制限なしで指定分のみ同期
            python scripts/zenn_sync.py --slugs "$SYNC_SLUGS"
          else
            python scripts/zenn_sync.py
          fi

      - name: Commit and push to zenn-content
        working-directory: zenn-content
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add articles/
          if git diff --staged --quiet; then
            echo "no new articles"
          else
            git commit -m "sync: $(date +%Y-%m-%d) articles from errorlog.jp"
            git push
          fi

      - name: Commit manifest to errorlog repo
        working-directory: errorlog
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/zenn_synced.json
          if git diff --staged --quiet; then
            echo "no manifest changes"
          else
            git commit -m "zenn: update sync manifest"
            git pull --rebase
            git push
          fi