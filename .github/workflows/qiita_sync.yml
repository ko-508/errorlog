name: Sync to Qiita

on:
  workflow_run:
    workflows: ["Daily Article Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      count:
        description: 'Articles to post (default: 3)'
        default: '3'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Post new articles to Qiita
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
          QIITA_COUNT: ${{ github.event.inputs.count || '3' }}
        run: python scripts/post_to_qiita.py

      - name: Commit posted tracking file
        run: |
          git config user.name "ErrorLog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add scripts/qiita_posted.json
          if git diff --staged --quiet; then
            echo "no new posts"
          else
            git commit -m "qiita: $(date +%Y-%m-%d) sync"
            git push
          fi
