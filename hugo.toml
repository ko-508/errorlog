baseURL = "https://errorlog.jp/"
ignoreFiles = ['\.jsonl$']
locale = "ja"
title = "ErrorLog - エラーコード解決ガイド"
copyright = "© 2026 ErrorLog - エラーコード解決ガイド"
theme = "PaperMod"
defaultContentLanguage = "ja"

paginate = 26

mainSections = ["posts"]

[params]
  description = "開発・運用中に遭遇するエラーコードの意味・原因・解決策をツール別に解説する開発者向けリファレンス"
  images = ["og-image.png"]
  author = "ErrorLog"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  hideDescriptionInList = true
  disableSpecial1stPost = true
  ShowToc = true
  TocOpen = true
  ShowCodeCopyButtons = true

[params.assets]
  theme_color = "#1a1a2e"
  msapplication_TileColor = "#1a1a2e"


[params.homeInfoParams]
  Title = "エラーコード解決ガイド"
  Content = "開発・運用で遭遇するエラーコードの原因と解決策を、ツール別にまとめたリファレンスです。"

[[menus.main]]
  name = "検索"
  url = "/search/"
  weight = 10

[[menus.main]]
  name = "タグ"
  url = "/tags/"
  weight = 20

[[menus.main]]
  name = "アーカイブ"
  url = "/archives/"
  weight = 30

[[menus.main]]
  name = "用語集"
  url = "/glossary/"
  weight = 40

[params.footer]
  text = '[プライバシーポリシー](/privacy/) · [運営者情報](/about/)'

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true
