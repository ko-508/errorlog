baseURL = "https://ko-508.github.io/errorlog/"
locale = "ja"
title = "ErrorLog - エラーコード解決ガイド"
theme = "PaperMod"
defaultContentLanguage = "ja"

[params]
  description = "Docker・AWS・GitHub API・Firebaseのエラーコードを原因から解決策まで解説"
  author = "ErrorLog"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  hideDescriptionInList = true
  disableSpecial1stPost = true

[params.homeInfoParams]
  Title = "エラーコード解決ガイド"
  Content = "Docker・AWS・GitHub API・Firebase のエラーを素早く解決するための記事一覧です。"

[[menus.main]]
  name = "検索"
  url = "/errorlog/search/"
  weight = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true
