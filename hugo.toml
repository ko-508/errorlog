baseURL = "https://ko-508.github.io/errorlog/"
locale = "ja"
title = "ErrorLog - エラーコード解決ガイド"
theme = "PaperMod"
defaultContentLanguage = "ja"

[params]
  description = "Docker・AWS・GitHub API・Firebaseのエラーコードを原因から解決策まで解説"
  author = "ErrorLog"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  hideDescriptionInList = true
  disableSpecial1stPost = true
  ShowToc = true
  TocOpen = true
  ShowCodeCopyButtons = true

[params.assets]
  theme_color = "#1a1a2e"
  msapplication_TileColor = "#1a1a2e"

[params.label]
  iconSVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 116 30" height="28"><text x="0" y="23" font-family="&apos;Courier New&apos;,Courier,monospace" font-size="23" font-weight="700"><tspan fill="#e05252">Error</tspan><tspan fill="currentColor">Log</tspan></text></svg>'

[params.homeInfoParams]
  Title = "エラーコード解決ガイド"
  Content = "Docker・AWS・GitHub API・Firebase のエラーを素早く解決するための記事一覧です。"

[[menus.main]]
  name = "検索"
  url = "/search/"
  weight = 10

[[menus.main]]
  name = "タグ"
  url = "/tags/"
  weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true
